services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-demand_capture}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      sh -c "pip install -r apps/api/requirements.txt &&
      PYTHONPATH=/app/apps/api uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      sh -c "pip install -r apps/api/requirements.txt -r worker/requirements.txt &&
      PYTHONPATH=/app/apps/api:/app/worker celery -A celery_app.celery_app worker --beat --loglevel=info"
    depends_on:
      - api
      - redis
      - postgres

  web:
    image: node:20
    working_dir: /app/apps/web
    volumes:
      - ./:/app
      - web_next:/app/apps/web/.next
    env_file:
      - .env
    command: >
      sh -c "npm install && npm run dev"
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  web_next:
